    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Poppins", sans-serif;
            user-select: none;
        }

        body {

            min-height: 100vh;

            display: flex;
            justify-content: center;

            background: #03050D;

            color: white;
            padding-top: 10px;

            transition: color .4s ease, background .4s ease;
        }




        #app {

            width: 100%;

            max-width: 900px;

            padding: 20px;

        }


        .biodata {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 25px;
            padding: 30px;
            border-radius: 25px;
            background: transparent;
            background-size: cover;
            background-position: center;
            border: 1px solid rgba(125, 131, 153, 0.35);
            box-shadow: none;
        }

        .profile-img {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            border: 0.7px solid rgba(88, 101, 255, 0.18);
            box-shadow: 0 0 6px rgba(88, 101, 255, 0.06);
        }

        .text {
            flex: 1;
        }

        h1 {
            font-size: 28px;
            font-weight: 700 !important;
            margin: 0;
            line-height: 1.1;
        }

        #typ::after {
            content: "|";
            animation: blink .8s infinite;
        }

        @keyframes blink {
            50% {
                opacity: 0;
            }
        }

        .bio {
            margin-top: 0.5px;
            color: #ddd;
            line-height: 1.4;
        }

        .minat {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 7px;
        }

        .minat-item {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            background: rgba(255, 255, 255, .08);
            border: 1px solid rgba(255, 255, 255, .25);
            color: #ddd;
        }

        .connect {
            margin-top: 25px;
        }

        .connect-title {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .connect-title span {
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, .2);
        }

        .connect-title h2 {
            font-size: 14px;
            letter-spacing: 5px;
            color: #aaa;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .link-card {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            border-radius: 20px;
            background:
                linear-gradient(120deg,
                    rgba(255, 255, 255, .07),
                    rgba(255, 255, 255, .02));
            border: 1px solid rgba(80, 120, 255, .18);
            transition: transform .25s ease, box-shadow .25s ease, border-color .25s ease, background .25s ease, background-position .35s ease;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            text-decoration: none;
            color: inherit;
            outline: none;
            background-size: 200% 200%;
            background-position: 0% 50%;
            position: relative;
            overflow: hidden;
        }

        @media (hover: hover) {
            .link-card:hover {
                transform: translateY(-4px);
                box-shadow: 0 18px 40px rgba(0, 0, 0, 0.12);
                border-color: rgba(255, 255, 255, 0.35);
                background-position: 100% 50%;
                background: linear-gradient(120deg, rgba(255, 255, 255, 0.16), rgba(255, 255, 255, 0.06));
            }

            .link-card:active {
                transform: translateY(-1px) scale(0.99);
                box-shadow: 0 12px 24px rgba(0, 0, 0, 0.1);
                border-color: rgba(255, 255, 255, 0.28);
            }
        }

        @media (hover: none) {
            .link-card:active {
                transform: translateY(-4px);
                box-shadow: 0 18px 40px rgba(0, 0, 0, 0.12);
                border-color: rgba(255, 255, 255, 0.35);
                background-position: 100% 50%;
                background: linear-gradient(120deg, rgba(255, 255, 255, 0.16), rgba(255, 255, 255, 0.06));
            }
        }

        .link-icon {
            width: 60px;
            height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 15px;
            background: #080d1d;
            margin-right: 20px;
            overflow: hidden;
        }

        .link-icon img {
            width: 32px;
            height: 32px;
            object-fit: contain;
        }

        .link-text {

            flex: 1;

        }

        .link-text h3 {

            font-size: 22px;

        }

        .link-text p {

            color: #aaa;

            margin-top: 4px;

        }

        .arrow {

            width: 55px;

            height: 55px;

            border-radius: 50%;

            display: flex;

            justify-content: center;

            align-items: center;

            font-size: 30px;

            border: 1px solid rgba(88, 101, 255, 0.26);
            background: rgba(88, 101, 255, 0.02);

        }



        .switch-d {

            margin-top: 40px;

            display: flex;

            justify-content: center;

            gap: 15px;

        }

        .switch-d button {
            padding: 12px 25px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.22);
            background: transparent;
            color: inherit;
            font-weight: 600;
            transition: transform .2s ease, background .2s ease, border-color .2s ease, box-shadow .2s ease;
        }


        .switch-d button:hover {
            transform: translateY(-3px);
        }

        .link-card,
        .switch-d button {
            user-select: none;
        }

        .link-card,
        .switch-d button {
            -webkit-tap-highlight-color: transparent;
        }

        .switch-d button:active {
            transform: scale(0.98);
            box-shadow: 0 0 0 8px rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.3);
        }






        .image-modal {
            position: fixed;
            inset: 0;
            display: flex;
            justify-content: center;
            align-items: center;

            visibility: hidden;
            opacity: 0;
            pointer-events: none;

            transition: opacity .25s ease;
            z-index: 9999;
        }

        .image-modal.open {
            visibility: visible;
            opacity: 1;
            pointer-events: auto;
        }


        .image-modal-backdrop {
            position: absolute;
            inset: 0;

            background: rgba(15, 15, 20, .18);

            backdrop-filter: blur(8px) saturate(130%);
            -webkit-backdrop-filter: blur(8px) saturate(130%);

            opacity: 0;

            transition:
                opacity .3s ease,
                background .3s ease;
        }

        .image-modal.open .image-modal-backdrop {
            opacity: 1;
            background: rgba(15, 15, 20, .24);
        }


        .image-modal-content {
            position: relative;

            display: inline-flex;
            justify-content: center;
            align-items: center;

            max-width: 95vw;
            max-height: 95vh;

            transform: scale(.94);
            opacity: 0;

            transition:
                transform .35s cubic-bezier(.22, 1, .36, 1),
                opacity .25s ease;

            z-index: 1;
        }

        .image-modal.open .image-modal-content {
            transform: scale(1);
            opacity: 1;
        }


        .image-modal-content img {
            display: block;

            max-width: 95vw;
            max-height: 95vh;

            width: auto;
            height: auto;

            object-fit: contain;

            border-radius: 14px;

            box-shadow:
                0 20px 60px rgba(0, 0, 0, .3);
        }


        .image-modal-close {
            position: absolute;

            top: 10px;
            right: 10px;

            width: 38px;
            height: 38px;

            border: 1px solid rgba(255, 255, 255, .25);
            border-radius: 50%;

            background: rgba(0, 0, 0, .45);

            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);

            color: #fff;

            font-size: 26px;
            font-weight: 600;

            cursor: pointer;
            -webkit-tap-highlight-color: transparent;

            display: flex;
            justify-content: center;
            align-items: center;

            z-index: 2;

            transition:
                transform .25s cubic-bezier(.22, 1, .36, 1),
                background .25s ease;
        }

        .image-modal-close:hover {
            background: rgba(0, 0, 0, .65);
        }

        .image-modal-close:active {
            transform: scale(.9);
        }

        body.bright .switch-d button {

            body.bright .link-card:active {

        }

        @media (hover: none) {

        body.bright .link-icon {

        }

        body.bright .minat-item {

        body.bright .connect-title h2 {

        @media (min-width: 601px) {

        @media(max-width:600px) {

        .page-loader {

            justify-content: center;

        .page-loader.hidden {

        .loader-inner {
            display: flex;
            flex-direction: column;

        }

        .splash-brand {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .splash-title {
            font-size: 42px;
            font-weight: 700;
            letter-spacing: 0.28em;
            color: #dfe5ff;
            text-transform: uppercase;
            text-shadow: 0 10px 30px rgba(88, 101, 255, 0.16);
        }



        .loader-dots {
            display: inline-flex;
            gap: 6px;
            margin-top: 4px;
        }

        .loader-dots span {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.9);
            animation: dotPulse 1s ease-in-out infinite;
        }

        .loader-dots span:nth-child(2) {
            animation-delay: .16s;
        }

        .loader-dots span:nth-child(3) {
            animation-delay: .32s;
        }

        @keyframes dotPulse {

            0%,
            80%,
            100% {
                transform: scale(0.7);
                opacity: 0.5;
            }

            40% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .loader-sub {
            color: rgba(205, 215, 255, 0.85);
            font-weight: 400;
            letter-spacing: 0.2px;
        }

        body.bright .page-loader {
            background: linear-gradient(135deg, rgba(245, 247, 255, 0.98), rgba(245, 247, 255, 0.96));
        }

        body.bright .splash-title {
            color: #1f2a44;
            text-shadow: 0 8px 24px rgba(88, 101, 255, 0.12);
        }

        body.bright .loader-sub {

        }

        body.bright .loader-dots span {

        }

        .modal-loader {

            z-index: 3;

        }

        .modal-loader.hidden {
            opacity: 0;

        }

        ::selection {

            color: #111;
        }

            background: #bdbdbd;

        }


        @media (max-width: 323px) {

                display: none;
            }
        }

        @media(max-width:600px) {

            .splash-title {
                font-size: 7vw;
            }
        }
    </style>

    <script>
        const themeBtn = document.getElementById("th");
        const typing = document.getElementById("typ");
        const text = "Hi, I'm Wahyuna.";

        function updateThemeColor() {
            const metaThemes = document.querySelectorAll('meta[name="theme-color"]');
            if (!metaThemes.length) return;
            const color = document.body.classList.contains('bright') ? '#f5f7ff' : '#03050D';
            metaThemes.forEach((metaTheme) => {
                metaTheme.content = color;
            });
        }

        function updateThemeButton() {
            if (document.body.classList.contains("bright")) {
                themeBtn.textContent = "Dark mode";
            } else {
                themeBtn.textContent = "Light mode";
            }
            updateThemeColor();
        }

        function saveThemePreference() {
            localStorage.setItem('wahyuna-theme', document.body.classList.contains('bright') ? 'bright' : 'dark');
        }

        function loadThemePreference() {
            const savedTheme = localStorage.getItem('wahyuna-theme');
            if (savedTheme === 'dark') {
                document.body.classList.remove('bright');
            } else {
                document.body.classList.add('bright');
            }
        }

        function applyInitialTheme() {
            loadThemePreference();
            updateThemeButton();
        }

        themeBtn.addEventListener("click", () => {
            document.body.classList.toggle("bright");
            saveThemePreference();
            updateThemeButton();
            updateThemeColor();
        });

        applyInitialTheme();
        updateThemeColor();

        const profileImg = document.querySelector('.profile-img');
        const imageModal = document.getElementById('imageModal');
        const modalClose = document.getElementById('modalClose');
        const modalBackdrop = document.getElementById('modalBackdrop');

        const modalImageEl = document.getElementById('modalImage');
        const modalLoader = document.getElementById('modalLoader');

        function openModal() {
            if (modalLoader) modalLoader.classList.remove('hidden');
            imageModal.classList.add('open');
            if (modalImageEl) {
                if (modalImageEl.complete) {
                    if (modalLoader) modalLoader.classList.add('hidden');
                } else {
                    modalImageEl.addEventListener('load', () => {
                        if (modalLoader) modalLoader.classList.add('hidden');
                    }, { once: true });
                }
            }
        }

        function closeModal() {
            imageModal.classList.remove('open');
            if (modalLoader) modalLoader.classList.add('hidden');
        }

        profileImg.addEventListener('click', openModal);
        modalClose.addEventListener('click', closeModal);
        modalBackdrop.addEventListener('click', closeModal);

        let i = 0;
        let deleting = false;

        function type() {
            if (!deleting) {
                typing.textContent = text.substring(0, i + 1);
                i++;
                if (i <= text.length) {
                    setTimeout(type, 120);
                } else {
                    deleting = true;
                    setTimeout(type, 2000);
                }
            } else {
                typing.textContent = text.substring(0, i - 1);
                i--;
                if (i > 0) {
                    setTimeout(type, 70);
                } else {
                    deleting = false;
                    setTimeout(type, 300);
                }
            }
        }

        type();


        (function () {
            const pageLoader = document.getElementById('pageLoader');
            const loaderStart = performance.now();
            const minSplashMs = 800;

            function hidePageLoader() {
                const elapsed = performance.now() - loaderStart;
                const wait = Math.max(0, minSplashMs - elapsed);
                setTimeout(() => {
                    if (!pageLoader) return;
                    pageLoader.classList.add('hidden');
                    setTimeout(() => {
                        if (pageLoader && pageLoader.parentNode) pageLoader.parentNode.removeChild(pageLoader);
                    }, 450);
                }, wait);
            }

            window.addEventListener('load', hidePageLoader);

            setTimeout(hidePageLoader, 4500);
        })();
    </script>

</body>

</html>
